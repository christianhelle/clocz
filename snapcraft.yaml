name: clocz
base: core22
version: 0.1.7
summary: A fast, multi-threaded line-of-code counter
description: |
  clocz is a fast, multi-threaded command-line tool for counting lines of code,
  written in Zig. It scans a directory tree, groups files by language, prints a
  text summary to standard output, and writes a report file you can keep,
  share, or publish.

  Features:
  - Counts code, comment, and blank lines per language.
  - Uses multi-threaded directory scanning through Zig's Thread.Pool for high
    throughput on large source trees.
  - Supports 60+ languages out of the box across systems, scripting, web, data, and config workflows.
  - Always prints a terminal-friendly text summary.
  - Writes report files as text, markdown, or standalone HTML.
  - Ships as a single static binary with zero external runtime dependencies.
  - Runs on Linux, macOS, and Windows.

  Installation:
  - Linux and macOS: use the install script from the GitHub repository.
  - Windows: use the PowerShell install script from the GitHub repository.
  - Snap: install with 'sudo snap install clocz'.
  - Source: build with 'zig build -Doptimize=ReleaseFast' using Zig 0.15.2 or
    newer.

  Usage:
  - Run 'clocz' to count lines in the current directory.
  - Run 'clocz ~/<project-name>' to scan a specific project in your home directory.
  - Run 'clocz --report markdown ~/<project-name>' to keep the normal text
    output and write clocz.markdown.
  - Run 'clocz --report html ~/<project-name>' to keep the normal text output
    and write clocz.html.
  - Run 'clocz --report text ~/<project-name>' to keep the normal text output
    and write clocz.txt.

  When --report is used, clocz still prints the standard text table to stdout.
  The selected report is also written to the current working directory as
  clocz.txt, clocz.markdown, or clocz.html. Note that clocz runs under strict
  confinement and can only write to the current directory if it is within an
  accessible location: non-hidden directories in your home directory or mounted
  removable media. The snap has access to the home and removable-media plugs.
  Bare --report uses text.

  The default text output is a terminal-friendly table sorted by code lines. It
  shows each detected language together with file, blank, comment, and code
  totals, followed by a final summary row and timing information.

  The markdown report file is designed for issues, pull requests, wikis, and
  other documentation. It renders as a clean table with totals plus runtime and
  throughput notes, making it easy to paste project metrics into collaboration
  workflows.

  The HTML report file is a standalone document with summary metrics,
  responsive layout, and a readable styled table that can be opened directly in
  a browser, attached to CI artifacts, or shared with stakeholders who prefer a
  visual report over terminal output.

  For each detected language, clocz reports:
  - Number of files.
  - Blank lines.
  - Comment lines.
  - Code lines.

  The final summary also includes total counts across all languages, elapsed
  runtime, and throughput in files per second.

  clocz is intended to be a lightweight alternative when you want fast results,
  simple installation, and exportable reports without introducing a larger
  runtime stack into your tooling. It fits local development, CI jobs, release
  validation, repository health checks, codebase snapshots, documentation
  updates, and team status reporting.

  Because clocz is written in Zig and distributed as a compact native
  executable, it starts quickly and is easy to integrate into shell scripts,
  automation pipelines, and reproducible developer environments. The standard
  output is easy to read in a terminal, the markdown report is ready for
  collaboration, and the HTML report is suitable for archiving or presentation.

  Typical uses:
  - Measuring language distribution in multi-language repositories.
  - Capturing line-count snapshots before and after refactors.
  - Publishing metrics in README files, issues, or pull requests.
  - Generating shareable HTML reports for build artifacts or audits.
  - Comparing repository composition across services or teams.
  - Adding fast line-count reporting to CI.

  Whether scanning a personal project or a large monorepo, clocz focuses on
  clear results, practical export formats, and dependable performance with
  minimal setup.

  It is well suited for teams that want a native utility with predictable
  behavior: no service dependency, no runtime to provision, and minimal
  packaging overhead beyond a single executable.

grade: stable
confinement: strict

apps:
  clocz:
    command: bin/clocz
    plugs:
      - home
      - removable-media

parts:
  zig:
    plugin: nil
    build-packages:
      - curl
      - xz-utils
    override-build: |
      snap install zig --classic --beta

  clocz:
    after: [zig]
    plugin: nil
    source: .
    override-build: |
      export PATH="$SNAPCRAFT_STAGE/zig:$PATH"
      zig build -Doptimize=ReleaseFast
      mkdir -p $SNAPCRAFT_PART_INSTALL/bin
      cp zig-out/bin/clocz $SNAPCRAFT_PART_INSTALL/bin/
    stage-packages:
      - libc6
